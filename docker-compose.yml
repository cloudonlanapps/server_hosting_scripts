services:
  db:
    image: postgres:16-alpine
    container_name: ${COMPOSE_PROJECT_NAME}-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ${DATA_DIR}/db:/var/lib/postgresql/data
    # No external port - only accessible within Docker network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      context: .
      args:
        GITHUB_TOKEN: ${GITHUB_TOKEN:-}
        REPO_BRANCH: ${REPO_BRANCH:-main}
        GIT_URL: ${GIT_URL}
    container_name: ${COMPOSE_PROJECT_NAME}-server
    restart: unless-stopped
    environment:
      # Database connection
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      # App configuration
      PROJECT_NAME: ${PROJECT_NAME}
      SECRET_KEY: ${SECRET_KEY}
      BOOTSTRAP_PASSWORD: ${BOOTSTRAP_PASSWORD}
      ENVIRONMENT: ${ENVIRONMENT:-production}
      UPLOAD_DIR: /data/uploads
      MAX_UPLOAD_SIZE_MB: ${MAX_UPLOAD_SIZE_MB:-10}
      # CORS configuration (comma-separated origins or "*" for all)
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-}
    ports:
      - "${SERVER_PORT:-127.0.0.1:8000:8000}"
    volumes:
      - ${DATA_DIR}/uploads:/data/uploads
      - ${DATA_DIR}/static:/app/static
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
