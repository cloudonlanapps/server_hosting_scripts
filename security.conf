#!/bin/bash
# security.conf - Shared security configuration
# Sourced by setup-security.sh and audit-security.sh
#
# Edit this file to change security requirements, then:
#   1. Run audit-security.sh to see what's out of compliance
#   2. Run setup-security.sh to apply changes
#   3. Run audit-security.sh again to verify

# ============================================
# UFW Firewall
# ============================================
UFW_DEFAULT_INCOMING="deny"
UFW_DEFAULT_OUTGOING="allow"
# Space-separated list of allowed TCP ports
UFW_ALLOWED_PORTS="4001 80 443"

# ============================================
# Nginx Rate Limiting - Zones
# ============================================
# Requests per second by endpoint type
NGINX_RATE_AUTH="5r/s"
NGINX_RATE_API="10r/s"
NGINX_RATE_GENERAL="20r/s"
# Shared memory zone size for rate limiting
NGINX_ZONE_SIZE="10m"

# Burst and connection limits per location
NGINX_AUTH_BURST=10
NGINX_AUTH_CONN_LIMIT=10
NGINX_API_BURST=20
NGINX_API_CONN_LIMIT=20
NGINX_GENERAL_BURST=30
NGINX_GENERAL_CONN_LIMIT=20

# Max upload body size
NGINX_CLIENT_MAX_BODY_SIZE="20M"

# ============================================
# Fail2ban Jails
# ============================================
# nginx-limit-req: bans IPs that exceed nginx rate limits
F2B_LIMIT_REQ_ENABLED=true
F2B_LIMIT_REQ_FINDTIME=600
F2B_LIMIT_REQ_BANTIME=3600
F2B_LIMIT_REQ_MAXRETRY=10

# nginx-badbots: bans IPs with too many 4xx errors (scanners)
F2B_BADBOTS_ENABLED=true
F2B_BADBOTS_FINDTIME=600
F2B_BADBOTS_BANTIME=86400
F2B_BADBOTS_MAXRETRY=5

# nginx-http-auth: bans IPs with repeated auth failures
F2B_HTTP_AUTH_ENABLED=true
F2B_HTTP_AUTH_FINDTIME=600
F2B_HTTP_AUTH_BANTIME=3600
F2B_HTTP_AUTH_MAXRETRY=5

# sshd: bans IPs with repeated SSH login failures
F2B_SSHD_PORT=4001
F2B_SSHD_ENABLED=true
F2B_SSHD_FINDTIME=600
F2B_SSHD_BANTIME=86400
F2B_SSHD_MAXRETRY=5

# ============================================
# Server Port Mapping
# ============================================
# Ports are now passed via --domain domain:port to setup-security.sh

# ============================================
# Direct IP Access
# ============================================
# Block requests that come via IP instead of domain name (return 444)
BLOCK_DIRECT_IP=true
